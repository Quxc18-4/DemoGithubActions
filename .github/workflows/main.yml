name: Thử nghiệm đọc file README  #name = tên của con robot.

on:  #Hành động khi
  push:  #Check khi có push
    branches: ["main"]  #Chạy khi có code mới được push lên "main"

jobs:
  thuc_hien_doc_file:
    runs-on: ubuntu-latest  #Mượn máy ảo Ubuntu của Github để chạy.

    steps:
      - name: Bước 1 - Xin chào
        run: echo "Hello World"  #Lệnh in ra màn hình.

      - name: Bước 2 - Tải code.
        uses: actions/checkout@v6.0.2  #Robot tự động copy code vào máy ảo.

      - name: Bước 3- Đọc file.
        run: cat READNE.md  #Mở nội dung file README.md để xem nội dung.
